user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    # Client body temp directory (writable by www-data)
    client_body_temp_path /tmp/nginx_client_body;
    client_body_buffer_size 128k;

    # Logging
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript;

    # Upstream for Next.js
    upstream nextjs {
        server 127.0.0.1:3000;
    }

    # Upstream for PHP-FPM
    upstream php-fpm {
        server 127.0.0.1:9000;
    }

    # Upstream for Laravel Reverb WebSocket server
    upstream reverb {
        server 127.0.0.1:6001;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html/backend/public;
        index index.php;

        # Security headers (shared via include to avoid header-redefinition issues)
        # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
        include /etc/nginx/security-headers.conf;

        # Max upload size
        client_max_body_size 100M;

        # Next.js API routes (must be before general /api location)
        location = /api/manifest {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            # nosemgrep: generic.nginx.security.request-host-used.request-host-used
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API routes -> Laravel
        location /api {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Sanctum CSRF cookie
        location /sanctum {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Laravel Echo / broadcasting auth
        location /broadcasting {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Health check
        location /up {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP handling for Laravel
        location ~ \.php$ {
            fastcgi_pass php-fpm;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
        }

        # Storage files
        location /storage {
            alias /var/www/html/backend/storage/app/public;
            try_files $uri =404;
        }

        # Next.js static files
        location /_next/static {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            # nosemgrep: generic.nginx.security.request-host-used.request-host-used
            proxy_set_header Host $host;

            # Cache static assets
            expires 1y;
            add_header Cache-Control "public, immutable";

            # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
            include /etc/nginx/security-headers.conf;
        }

        # Next.js public files
        location /static {
            alias /var/www/html/frontend/public;
            try_files $uri =404;
        }

        # Laravel Reverb WebSocket server
        location /app {
            proxy_pass http://reverb;
            proxy_http_version 1.1;
            # nosemgrep: generic.nginx.security.request-host-used.request-host-used
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # All other routes -> Next.js
        # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        # Mitigated: Upgrade/Connection headers are only forwarded when $http_upgrade is set
        # (conditional if block below), preventing H2C smuggling on non-WebSocket requests.
        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            # nosemgrep: generic.nginx.security.request-host-used.request-host-used
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Only proxy upgrade headers when client requests a WebSocket upgrade
            # (prevents H2C upgrade smuggling on non-upgrade requests)
            set $connection_upgrade "";
            set $upgrade_header "";
            if ($http_upgrade) {
                set $connection_upgrade "upgrade";
                set $upgrade_header $http_upgrade;
            }
            proxy_set_header Upgrade $upgrade_header;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
